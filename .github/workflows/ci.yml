name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# One in-flight run per ref; newer pushes cancel older ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        # rustup reads rust-toolchain.toml and installs the pinned channel.
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add rustfmt clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy (warnings denied)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  catalog:
    name: catalog integrity (BR-8/AC-8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Verifies that the *catalog* is honest: every entry's `sha256` and
      # `size_bytes` are compared against HuggingFace's `lfs.oid`/`lfs.size` at
      # the pinned revision, the revision is an immutable 40-hex commit SHA, and
      # the repo answers an anonymous, ungated request (REQ-547 architecture
      # D-1). That is metadata only — no artifact is downloaded, so the whole
      # catalog verifies in a couple of seconds and can gate every run.
      #
      # The artifact's own bytes are still hashed against these digests at
      # download time by the downloader (BR-6). The two checks answer different
      # questions; neither replaces the other.
      #
      # Exit codes are a taxonomy, not a boolean, because an upstream outage
      # must never be mistakable for corruption — nor pass unnoticed:
      #
      #   0   VERIFIED    green.
      #   1   MISMATCH    red, ::error::. A genuine integrity failure. Do not
      #                   merge; a digest disagrees with the artifact, a repo
      #                   went gated, or the file was hand-edited.
      #   75  UNVERIFIED  red, ::warning::. HuggingFace was unreachable after
      #                   retries. Nothing was learned about the catalog either
      #                   way — this is NOT corruption. Re-run the job once
      #                   upstream recovers. It fails rather than passes so an
      #                   outage cannot quietly waive the gate.
      - name: Catalog integrity (HuggingFace LFS metadata, no downloads)
        run: |
          set +e
          python3 tools/refresh-catalog.py --check
          status=$?
          set -e
          case "$status" in
            0)
              echo "::notice title=Catalog integrity::VERIFIED — every entry matches HuggingFace's LFS metadata at its pinned revision."
              ;;
            75)
              echo "::warning title=Catalog integrity UNVERIFIED::HuggingFace was unreachable, so the catalog could NOT be verified. This is NOT a digest mismatch and NOT evidence of corruption. Re-run this job when upstream is reachable."
              ;;
            *)
              echo "::error title=Catalog integrity MISMATCH::The catalog disagrees with HuggingFace at a pinned revision. This is a genuine integrity failure, not a network problem — see the log for the offending entry and field."
              ;;
          esac
          exit "$status"

  e2e:
    name: acceptance suite (REQ-544 + REQ-547)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # The end-to-end acceptance suite (TASK-014) spawns the real `tetond`
      # binary and drives every AC against mock transports/engines — no model
      # weights and no live API keys. It gates every PR, covering REQ-544's
      # `ac_matrix` and REQ-547's `consent_matrix` (AC-1..AC-12). The
      # `--features live` real-provider smoke test stays ignored here by design.
      - name: Acceptance suite
        run: cargo test -p tetond --test e2e

  audit:
    name: dependency advisories (cargo audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # The daemon now ships a production HTTP client that fetches multi-GB
      # third-party artifacts, so a dependency-advisory gate belongs beside the
      # catalog-integrity job. The RustSec advisory DB fetch is split from the
      # check so the two failure modes cannot be confused — the same taxonomy the
      # catalog job uses:
      #
      #   * a transient DB-fetch outage teaches nothing about our dependencies,
      #     so it warns and passes rather than reding the build on GitHub's
      #     availability;
      #   * a real advisory in the resolved tree fails the job.
      - name: Fetch advisory database
        id: advisory_db
        continue-on-error: true
        run: git clone --depth 1 https://github.com/RustSec/advisory-db "$HOME/.cargo/advisory-db"

      - name: Audit dependencies for security advisories
        run: |
          if [ ! -d "$HOME/.cargo/advisory-db/.git" ]; then
            echo "::warning title=cargo audit UNVERIFIED::The RustSec advisory database could not be fetched, so dependencies were NOT audited this run. This is a transient outage, not a vulnerability — re-run when GitHub is reachable."
            exit 0
          fi
          cargo audit --no-fetch --db "$HOME/.cargo/advisory-db"
