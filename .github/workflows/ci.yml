name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# One in-flight run per ref; newer pushes cancel older ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        # rustup reads rust-toolchain.toml and installs the pinned channel.
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add rustfmt clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy (warnings denied)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  e2e:
    name: acceptance suite (AC-1..AC-9)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: |
          rustup show active-toolchain || rustup toolchain install

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # The end-to-end acceptance suite (TASK-014) spawns the real `tetond`
      # binary and drives every AC against mock transports/engines — no model
      # weights and no live API keys. It gates every PR. The `--features live`
      # real-provider smoke test stays ignored here by design.
      - name: Acceptance suite
        run: cargo test -p tetond --test e2e
